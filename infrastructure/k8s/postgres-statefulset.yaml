apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-oltp
  namespace: unianalytics
spec:
  serviceName: postgres-oltp
  replicas: 1
  selector:
    matchLabels:
      app: postgres-oltp
  template:
    metadata:
      labels:
        app: postgres-oltp
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: 2000m, memory: 4Gi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-oltp
  namespace: unianalytics
spec:
  selector:
    app: postgres-oltp
  ports:
    - port: 5432
  clusterIP: None
