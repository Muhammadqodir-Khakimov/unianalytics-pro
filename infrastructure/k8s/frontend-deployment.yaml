apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unianalytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/muhammadqodir-khakimov/unianalytics-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: unianalytics
spec:
  selector:
    app: frontend
  ports:
    - port: 80
  type: ClusterIP
