# Real production da: kubectl create secret generic ... yoki Sealed Secrets
# Bu fayl namuna — git ga commit qilmang

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: unianalytics
type: Opaque
stringData:
  SECRET_KEY: "change-me-to-strong-random"
  OLTP_DB_URL: "postgresql+psycopg2://oltp_user:oltp_pass@postgres-oltp:5432/student_oltp"
  OLAP_DB_URL: "postgresql+psycopg2://olap_user:olap_pass@postgres-olap:5432/student_olap"
  ANTHROPIC_API_KEY: "your-claude-key"
  TELEGRAM_BOT_TOKEN: "your-bot-token"
  SENTRY_DSN: "your-sentry-dsn"
  ESKIZ_EMAIL: "your@email.uz"
  ESKIZ_PASSWORD: "your-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: unianalytics
type: Opaque
stringData:
  POSTGRES_USER: oltp_user
  POSTGRES_PASSWORD: change-me-strong-pass
  POSTGRES_DB: student_oltp
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: unianalytics
data:
  APP_ENV: production
  APP_DEBUG: "false"
  CORS_ORIGINS: "https://unianalytics.uz,https://www.unianalytics.uz"
