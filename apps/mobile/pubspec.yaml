name: unianalytics_mobile
description: "UniAnalytics PRO - Talabalar reyting tahlili (mobile)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.1.0

  # Codegen / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / charts / animations
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # i18n
  intl: ^0.20.1

  # Utils
  logger: ^2.5.0
  equatable: ^2.0.7

  # Auth helpers (biometrics)
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.8.2

flutter:
  uses-material-design: true
  generate: true  # for l10n (gen_l10n)

  assets:
    - assets/images/
    - assets/icons/
