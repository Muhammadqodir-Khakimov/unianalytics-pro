org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Windowsda pub cache (C:\) va loyiha (D:\) turli disklarda bo'lganda,
# Kotlin incremental compiler nisbiy yo'lni hisoblay olmasdan crashlaydi:
#   IllegalArgumentException: this and base files have different roots: C:\... and D:\...
# Incremental kompilyatsiyani o'chirib qo'yamiz — full builds biroz sekinroq,
# lekin barqaror ishlaydi.
kotlin.incremental=false
kotlin.incremental.usePreciseJavaTracking=false
