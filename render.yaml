# Render.com deployment configuration
# https://render.com

services:
  - type: web
    name: student-olap-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: OLTP_DB_URL
        fromDatabase:
          name: student-olap-oltp
          property: connectionString
      - key: OLAP_DB_URL
        fromDatabase:
          name: student-olap-olap
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: student-olap-redis
          property: host
    autoDeploy: true

  - type: web
    name: student-olap-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile.prod
    plan: starter
    envVars:
      - key: VITE_API_BASE_URL
        value: https://student-olap-backend.onrender.com/api/v1
    autoDeploy: true

  - type: worker
    name: student-olap-bot
    runtime: docker
    rootDir: apps/bot
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false                       # @BotFather tokeni — qo'lda kiritiladi
      - key: BACKEND_API_URL
        value: https://student-olap-backend.onrender.com/api/v1
      - key: BOT_MODE
        value: polling
      - key: REDIS_URL
        fromService:
          type: redis
          name: student-olap-redis
          property: connectionString
      - key: RATE_LIMIT_PER_MIN
        value: "20"
    autoDeploy: true

  - type: redis
    name: student-olap-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: student-olap-oltp
    plan: free
    databaseName: student_oltp
    user: oltp_user

  - name: student-olap-olap
    plan: free
    databaseName: student_olap
    user: olap_user
