# Render.com deployment configuration
# https://render.com

services:
  - type: web
    name: student-olap-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: OLTP_DB_URL
        fromDatabase:
          name: student-olap-oltp
          property: connectionString
      - key: OLAP_DB_URL
        fromDatabase:
          name: student-olap-olap
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: student-olap-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: student-olap-redis
          property: port
      - key: AUTO_INIT_DB
        value: "true"
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: student-olap-redis
          property: connectionString
    autoDeploy: true

  - type: redis
    name: student-olap-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: student-olap-oltp
    plan: free
    databaseName: student_oltp
    user: oltp_user

  - name: student-olap-olap
    plan: free
    databaseName: student_olap
    user: olap_user
