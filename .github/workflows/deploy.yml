name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service backend --detach || echo "Backend deploy skipped (no token)"

  deploy-northflank:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Northflank Deploy
        env:
          NF_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NF_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NF_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
        run: |
          if [ -z "$NF_API_KEY" ]; then
            echo "⚠️ NORTHFLANK_API_KEY not set — skipping Northflank deploy"
            exit 0
          fi
          echo "🚀 Triggering Northflank deploy..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.northflank.com/v1/projects/${NF_PROJECT_ID}/services/${NF_SERVICE_ID}/deployment" \
            -H "Authorization: Bearer ${NF_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\": \"main\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Northflank deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Northflank deploy failed (HTTP $RESPONSE)"
            exit 1
          fi

  deploy-render:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "No Render hook"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-northflank]
    if: always()
    steps:
      - name: Telegram notify
        if: env.TELEGRAM_TOKEN != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="✅ muvaffaqiyatli"
          if [ "${{ needs.deploy-northflank.result }}" != "success" ]; then
            STATUS="❌ xatolik"
          fi
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT" \
            -d "text=🚀 Student OLAP Northflank deploy: $STATUS (${{ github.ref_name }})"
